name: NexusGrid CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  DOCKER_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Test
  # ──────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore NexusGrid.sln

      - name: Build
        run: dotnet build NexusGrid.sln -c Release --no-restore

      - name: Run tests
        run: |
          dotnet test NexusGrid.sln \
            -c Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: "**/test-results.trx"
          reporter: dotnet-trx

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "**/coverage.cobertura.xml"

  # ──────────────────────────────────────────────
  # Job 2: Docker Build & Push
  # ──────────────────────────────────────────────
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: gateway
            dockerfile: src/NexusGrid.Gateway/Dockerfile
          - name: order-service
            dockerfile: src/NexusGrid.OrderService/Dockerfile
          - name: user-service
            dockerfile: src/NexusGrid.UserService/Dockerfile
          - name: notification-service
            dockerfile: src/NexusGrid.NotificationService/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE=${{ env.DOCKER_REGISTRY }}/nexusgrid-${{ matrix.service.name }}
          TAG=${GITHUB_SHA::8}
          docker build -t $IMAGE:$TAG -t $IMAGE:latest -f ${{ matrix.service.dockerfile }} .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

  # ──────────────────────────────────────────────
  # Job 3: Terraform Plan (PR check)
  # ──────────────────────────────────────────────
  terraform-plan:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var-file=environments/staging/terraform.tfvars \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -input=false \
            -no-color
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ──────────────────────────────────────────────
  # Job 4: Deploy to Staging
  # ──────────────────────────────────────────────
  deploy-staging:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name nexusgrid-staging-eks --region us-east-1

      - name: Deploy services
        run: |
          TAG=${GITHUB_SHA::8}
          SERVICES="gateway order-service user-service notification-service"
          for SVC in $SERVICES; do
            kubectl set image deployment/$SVC \
              $SVC=${{ env.DOCKER_REGISTRY }}/nexusgrid-$SVC:$TAG \
              -n nexusgrid
            kubectl rollout status deployment/$SVC -n nexusgrid --timeout=120s
          done

      - name: Smoke test
        run: |
          GATEWAY=$(kubectl get svc gateway-svc -n nexusgrid -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -sf "http://$GATEWAY/health" || exit 1
          echo "Staging health check passed"

  # ──────────────────────────────────────────────
  # Job 5: Deploy to Production (manual approval)
  # ──────────────────────────────────────────────
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name nexusgrid-production-eks --region us-east-1

      - name: Canary deploy
        run: |
          TAG=${GITHUB_SHA::8}
          SERVICES="gateway order-service user-service notification-service"
          for SVC in $SERVICES; do
            kubectl set image deployment/$SVC \
              $SVC=${{ env.DOCKER_REGISTRY }}/nexusgrid-$SVC:$TAG \
              -n nexusgrid-prod
            kubectl rollout status deployment/$SVC -n nexusgrid-prod --timeout=180s
          done

      - name: Post-deploy health check
        run: |
          GATEWAY=$(kubectl get svc gateway-svc -n nexusgrid-prod -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          for i in $(seq 1 5); do
            if curl -sf "http://$GATEWAY/health"; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Production health check failed"
          exit 1
