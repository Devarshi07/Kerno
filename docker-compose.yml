services:
  # ──────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────

  postgres-orders:
    image: postgres:16-alpine
    container_name: nexusgrid-postgres-orders
    environment:
      POSTGRES_DB: nexusgrid_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-users:
    image: postgres:16-alpine
    container_name: nexusgrid-postgres-users
    environment:
      POSTGRES_DB: nexusgrid_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4.1
    container_name: nexusgrid-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: NexusGridCluster
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  cassandra-init:
    image: cassandra:4.1
    container_name: nexusgrid-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint: >
      bash -c "
        echo 'Creating keyspace...' &&
        cqlsh cassandra -e \"
          CREATE KEYSPACE IF NOT EXISTS nexusgrid
          WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
        \" &&
        echo 'Keyspace created successfully.'
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: nexusgrid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Application Services
  # ──────────────────────────────────────────────

  order-service:
    build:
      context: .
      dockerfile: src/NexusGrid.OrderService/Dockerfile
    container_name: nexusgrid-order-service
    ports:
      - "5101:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__OrderDb: "Host=postgres-orders;Port=5432;Database=nexusgrid_orders;Username=postgres;Password=postgres"
    depends_on:
      postgres-orders:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: src/NexusGrid.UserService/Dockerfile
    container_name: nexusgrid-user-service
    ports:
      - "5102:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__UserDb: "Host=postgres-users;Port=5432;Database=nexusgrid_users;Username=postgres;Password=postgres"
      Jwt__SecretKey: "NexusGrid-Super-Secret-Key-For-Development-Only-Min-32-Chars!"
      Jwt__Issuer: "NexusGrid.UserService"
      Jwt__Audience: "NexusGrid"
      Jwt__ExpirationMinutes: "60"
    depends_on:
      postgres-users:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: src/NexusGrid.NotificationService/Dockerfile
    container_name: nexusgrid-notification-service
    ports:
      - "5103:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Cassandra__ContactPoint: cassandra
      Cassandra__Port: "9042"
      Cassandra__Keyspace: nexusgrid
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: src/NexusGrid.Gateway/Dockerfile
    container_name: nexusgrid-gateway
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Redis: "redis:6379"
      Jwt__SecretKey: "NexusGrid-Super-Secret-Key-For-Development-Only-Min-32-Chars!"
      Jwt__Issuer: "NexusGrid.UserService"
      Jwt__Audience: "NexusGrid"
      # Override YARP cluster addresses to use container names
      ReverseProxy__Clusters__order-service__Destinations__destination1__Address: "http://order-service:8080/"
      ReverseProxy__Clusters__user-service__Destinations__destination1__Address: "http://user-service:8080/"
      ReverseProxy__Clusters__notification-service__Destinations__destination1__Address: "http://notification-service:8080/"
    depends_on:
      - order-service
      - user-service
      - notification-service
      - redis
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Frontend
  # ──────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusgrid-frontend
    ports:
      - "8080:80"
    depends_on:
      - gateway
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Observability
  # ──────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: nexusgrid-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - gateway
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: nexusgrid-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_orders_data:
  postgres_users_data:
  cassandra_data:
  redis_data:
  prometheus_data:
  grafana_data:
