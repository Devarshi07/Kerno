apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra
  namespace: nexusgrid
  labels:
    app: cassandra
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
        tier: database
    spec:
      containers:
        - name: cassandra
          image: cassandra:4.1
          ports:
            - containerPort: 9042
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: NexusGridCluster
            - name: HEAP_NEWSIZE
              value: "128M"
            - name: MAX_HEAP_SIZE
              value: "512M"
          volumeMounts:
            - name: cassandra-storage
              mountPath: /var/lib/cassandra
          readinessProbe:
            exec:
              command: ["cqlsh", "-e", "DESCRIBE KEYSPACES"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: cassandra-storage
          emptyDir: {}
