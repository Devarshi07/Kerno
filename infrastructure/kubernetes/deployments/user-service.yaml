apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: nexusgrid
  labels:
    app: user-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tier: backend
    spec:
      containers:
        - name: user-service
          image: nexusgrid/user-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: user-service-config
          env:
            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: jwt-secret-key
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
